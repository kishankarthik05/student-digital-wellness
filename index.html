<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseMetrics - Student Digital Wellness Analyzer</title>
  <!-- Tailwind CSS Engine Link -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-slow': 'pulseSlow 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulseSlow: { '0%, 100%': { opacity: '0.25', transform: 'scale(1)' }, '50%': { opacity: '0.4', transform: 'scale(1.1) translateY(-10px)' } }
          }
        }
      }
    }
  </script>
  <style>
    ::selection { background: rgba(99, 102, 241, 0.3); color: #fff; }
    body { background-color: #030712; color-scheme: dark; }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col antialiased relative overflow-x-hidden selection:bg-indigo-500/30">

  <!-- Modern Mesh-Gradient Background Atmosphere -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[80vw] md:w-[50vw] h-[80vw] md:h-[50vw] rounded-full bg-gradient-to-br from-indigo-600/20 to-purple-600/0 blur-[80px] md:blur-[120px] animate-pulse-slow"></div>
    <div class="absolute top-[20%] right-[-5%] w-[70vw] md:w-[45vw] h-[70vw] md:h-[45vw] rounded-full bg-gradient-to-br from-emerald-600/10 to-blue-600/0 blur-[90px] md:blur-[130px] animate-pulse-slow" style="animation-delay: 2s;"></div>
    <div class="absolute bottom-[-5%] left-[15%] w-[65vw] md:w-[40vw] h-[65vw] md:h-[40vw] rounded-full bg-gradient-to-br from-pink-600/10 to-indigo-600/0 blur-[80px] md:blur-[120px] animate-pulse-slow" style="animation-delay: 4s;"></div>
  </div>

  <!-- Main Sticky Glass Navigation Header (Fully Optimized for Mobile Flexing) -->
  <header class="sticky top-0 z-50 w-full border-b border-white/5 bg-slate-950/60 backdrop-blur-xl">
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-3 md:h-16 flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-0">
      <div onclick="navigate('home')" class="text-xl font-black tracking-tight text-white cursor-pointer hover:opacity-90 active:scale-95 transform transition-all duration-200">
        Pulse<span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Metrics</span>
      </div>
      <nav class="flex flex-wrap justify-center gap-1 bg-white/5 p-1 rounded-xl border border-white/5 w-full sm:w-auto">
        <button onclick="navigate('dashboard')" class="text-[11px] md:text-xs font-semibold text-slate-300 hover:text-white px-2.5 md:px-4 py-2 rounded-lg hover:bg-white/5 active:scale-98 transform transition-all duration-200 flex-1 sm:flex-none text-center">
          Dashboard
        </button>
        <button onclick="navigate('calculator')" class="text-[11px] md:text-xs font-semibold text-slate-300 hover:text-white px-2.5 md:px-4 py-2 rounded-lg hover:bg-white/5 active:scale-98 transform transition-all duration-200 flex-1 sm:flex-none text-center">
          Calculator
        </button>
        <button onclick="navigate('stories')" class="text-[11px] md:text-xs font-semibold text-slate-300 hover:text-white px-2.5 md:px-4 py-2 rounded-lg hover:bg-white/5 active:scale-98 transform transition-all duration-200 flex-1 sm:flex-none text-center">
          Data Stories
        </button>
      </nav>
    </div>
  </header>

  <!-- App Main Content Canvas (Dynamic Padding Adjustment) -->
  <main id="main-content" class="relative z-10 flex-1 max-w-6xl w-full mx-auto px-4 md:px-6 py-6 md:py-12">
    <!-- View contexts render dynamically here -->
  </main>

  <!-- Professional Minimal Footer -->
  <footer class="relative z-10 w-full border-t border-white/5 bg-slate-950/20 py-6 px-4 text-center text-[10px] md:text-[11px] text-slate-500 font-medium tracking-wide leading-relaxed">
    &copy; PulseMetrics Analytics Infrastructure Studio. All parameters verified against production distribution records.
  </footer>

  <script src="app.js"></script>
</body>
</html>
